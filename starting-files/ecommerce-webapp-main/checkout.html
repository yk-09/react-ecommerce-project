<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      CheckOut
    </title>

    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/checkout/checkout.css">
    <link rel="stylesheet" href="styles/checkout/empty-checkout.css">
    <link rel="stylesheet" href="styles/skeleton.css">
  </head>
  <body>
    <header class="kaamna-header">
      <div class="header-content">
          <div class="brand-section">
            <a href="index.html">
              <img src="/brand-icon.jpg" alt="Kaamna Icon" class="brand-icon" />
            </a>
          </div>
        <div class="checkout-status js-checkout-status">
          <h2 class="js-checkout-quantity">
            Checkout(0 items)
          </h2>
        </div>
      </div>
    </header>
    <main>
      <article class="loading-homepage js-loading-homepage">
        <nav class="nav">
          <div class="image skeleton"></div>
          <div class="search skeleton"></div>
          <div class="return-orders skeleton"></div>
          <div class="hart skeleton"></div>
        </nav>

        <section class="hero-section">
          <div class="p-1 skeleton"></div>
          <div class="p-2 skeleton"></div>
        </section>

        <section class="products-grid">
          <article class="product skeleton">
          </article>
          <article class="product skeleton">
          </article>
          <article class="product skeleton">
          </article>
          <article class="product skeleton">
          </article>
          <article class="product skeleton">
          </article>
          <article class="product skeleton">
          </article>
        </section>
      </article>

      <section class="main-content js-cart-empty">
        <div class="empty-cart-card">
          
          <div class="illustration-container">
            <svg class="large-cart-svg" viewBox="0 0 24 24" fill="none" stroke="#1a3a2a" stroke-width="1.5">
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
          </div>

          <h2 class="alert-headline">Aapki cart khaali hai. Bilkul aapki tarah.</h2>
          <p class="alert-subline">Kuch bhar lo?</p>

          <a href="index.html" class="explore-btn">Explore Attachments</a>
          
        </div>
      </section>

      <section class="checkout-grid js-checkout-grid">
        <div class="order-review js-order-review">
          <h2>Review your attachments</h2>
        </div>

        <section class="payment-summary js-payment-summary"></section>
      </section>
    </main>

    <script src="./src/checkout.ts" type="module"></script>
  </body>
</html>
