<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="styles/nav.css">
    <link href="styles/homepage.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles/skeleton.css">
  </head>

  <body>
    <article class="loading-homepage js-loading-homepage">
      <nav class="nav">
        <div class="image skeleton"></div>
        <div class="search skeleton"></div>
        <div class="return-orders skeleton"></div>
        <div class="hart skeleton"></div>
      </nav>

      <section class="hero-section">
        <div class="p-1 skeleton"></div>
        <div class="p-2 skeleton"></div>
      </section>

      <section class="products-grid">
        <article class="product skeleton">
        </article>
        <article class="product skeleton">
        </article>
        <article class="product skeleton">
        </article>
        <article class="product skeleton">
        </article>
        <article class="product skeleton">
        </article>
        <article class="product skeleton">
        </article>
      </section>
    </article>

    <header class="hidden js-homepage-header">
      <nav class="navbar-large-screens">
        <figure>
          <img src="/brand-icon.jpg" alt="kaamna brand icon jaha paisa khatam kaamna nahi " width="200" height="80">
        </figure>
        <form action="" method="get">
          <label for="search-bar" class="sr-only"></label>
          <button type="submit">
            <svg
              class="search-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#888"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
          <input id="search-bar-ld" name="search-bar" type="search" placeholder="Apni kaamna khojiye (search your desires)">
        </form>
        <a href="orders.html" class="order-page-link">
          Returns&Orders
        </a>
        <div class="cart-wrapper">
          <a href="checkout.html">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"
              />
            </svg>
            <span class="cart-quantity js-cart-quantity-ld">1</span>
          </a>
        </div>
      </nav>
      <nav class="navbar-small-screens">
        <div class="nav-top">
          <figure>
            <img src="/brand-icon.jpg" alt="brand icon kaamna jaha paisa khatam kaamna nai" width="200" height="80">
          </figure>
          <button class="expand-menu-btn js-expand-menu-btn">☰</button>
        </div>
        <div class="mobile-menu js-mobile-menu">
          <div class="cart-wrapper">
            <a href="checkout.html">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"
                />
              </svg>
              <span class="cart-quantity js-cart-quantity-sd">1</span>
              <p>
                ( Checkout your desires )
              </p>
            </a>
          </div>
          <a href="orders.html" class="order-page-link">
            Returns&Orders
          </a>
        </div>
      </nav>
      <form class="search-products-sd" action="" method="get">
        <label class="sr-only" for="search-bar">search products</label>
        <button type="submit">
          <svg
            class="search-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#888"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <input id="search-bar" name="search-bar" type="text" placeholder="Search your desires">
      </form>
    </header>

    <!-- hero text -->
    <section class="hero-container js-hero-section hidden">
      <h1 class="hero-main">
        Jaha <span class="red-line">Paisa</span> khatam hota hai... <br />
        <span class="green-underline">Par Kaamna nahi.</span>
      </h1>
      <p class="hero-italic">
        Try karke dekhlo.
      </p>
    </section>

    <!-- products container -->
    <section class="container my-5">
      <div
        class="row row-cols-1 row-cols-lg-4 row-cols-md-2 g-4 js-products-row"
      >
        <!-- generating prodycts html using javascript -->
      </div>
    </section>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="./src/homepage.ts" type="module"></script>
  </body>
</html>
